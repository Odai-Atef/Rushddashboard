                      - listitem [ref=e512]:
                        - strong [ref=e513]: منتج د
                        - text: يحقق متوسط إيراد 1200 دولار لكل طلب، بينما
                        - strong [ref=e514]: منتج ج
                        - text: يحقق 150 دولار فقط، مما يوضح أن الطلب على المنتج ج محدود جداً.
