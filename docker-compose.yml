version: '3.8'

# Rushd Platform - Docker Compose Configuration
# This file coordinates the frontend application with other services.
# Environment variables are loaded from .env file automatically.

services:
  # Frontend Application
  rushd-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time environment variables (passed to Dockerfile ARGs)
        VITE_APP_NAME: ${VITE_APP_NAME:-Rushd Platform}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-30000}
        VITE_API_RETRY_ATTEMPTS: ${VITE_API_RETRY_ATTEMPTS:-3}
        VITE_ENABLE_AI_ANALYSIS: ${VITE_ENABLE_AI_ANALYSIS:-true}
        VITE_ENABLE_REAL_TIME_NOTIFICATIONS: ${VITE_ENABLE_REAL_TIME_NOTIFICATIONS:-false}
        VITE_ENABLE_DARK_MODE_BY_DEFAULT: ${VITE_ENABLE_DARK_MODE_BY_DEFAULT:-true}
        VITE_AUTH_TOKEN_KEY: ${VITE_AUTH_TOKEN_KEY:-rushd_auth_token}
        VITE_REFRESH_TOKEN_KEY: ${VITE_REFRESH_TOKEN_KEY:-rushd_refresh_token}
        VITE_TOKEN_EXPIRY_DAYS: ${VITE_TOKEN_EXPIRY_DAYS:-7}
        VITE_ENABLE_ANALYTICS: ${VITE_ENABLE_ANALYTICS:-false}
        VITE_ANALYTICS_TRACKING_ID: ${VITE_ANALYTICS_TRACKING_ID:-}
        VITE_DEV_MOCK_API: ${VITE_DEV_MOCK_API:-false}
        VITE_DEV_DELAY_MS: ${VITE_DEV_DELAY_MS:-0}
    container_name: rushd-frontend
    ports:
      - "80:80"
    environment:
      # Runtime environment variables (if needed for SSR or server-side logic)
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - rushd-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rushd-network:
    driver: bridge
    name: rushd-network
    
